id: null
prompt: |
  The platform team reran a quarterly disaster recovery drill for GlitchTip.
  The latest backup note in-cluster still says the pipeline is healthy, but the
  restore told a different story: issue detail pages with file attachments had
  broken links, and a few symbolicated traces came back incomplete.

  GlitchTip is still running in the existing namespace with PostgreSQL and
  S3-compatible object storage. Someone already touched the backup pipeline a
  while ago, so this is not just a missing `pg_dump` problem. Trace how the
  attachment metadata and the object store line up, figure out why the backup
  can still look green while restored data is wrong, and harden the pipeline so
  it fails closed when those two sources drift.

  A clean backup run should still be able to complete, but mismatches must be
  caught before the next drill. That includes records that point at missing
  objects, leftover objects that no current record references, and cases where
  simple totals still look fine even though the actual sets do not match.

  There is already a persistent status surface for the backup pipeline in the
  cluster, but it is stale and not trustworthy. Update the pipeline so the
  latest run state is written there clearly enough for on-call to tell whether
  a run succeeded or failed without digging through pod logs.

  The GlitchTip and object-storage details should be discoverable from the
  cluster secrets and ConfigMaps.

metadata:
  category: platform-eng
  spec_id: 9e4d158e-96ff-4435-ab39-4d1e389f4b47
