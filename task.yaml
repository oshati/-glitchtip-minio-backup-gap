id: null
prompt: |
  The platform team just ran a quarterly disaster recovery drill for GlitchTip.
  They restored from the most recent PostgreSQL backup into the existing namespace
  and everything looked fine at first — issues loaded, projects were visible, alert
  rules were intact.

  But then engineers started reporting that issue detail pages for events with file
  attachments show broken links, and stack traces for a few services are incomplete.
  Someone mentioned GlitchTip was migrated to use MinIO for attachment storage about
  six months ago, but nobody is sure if the backup pipeline was updated to account for
  that.

  The backup runs as a Kubernetes CronJob somewhere in the cluster. Can you trace
  the attachment storage path, figure out why the restored data is incomplete, and
  fix the backup pipeline so this doesn't happen again? There should also be some
  kind of validation step that catches this sort of gap before it becomes a problem.

  Also, when we had that TLS incident last quarter, nobody knew the backup had
  failed until the DR drill. The backup pipeline should report its status
  somewhere persistent so the on-call team can tell if a run failed without
  having to dig through pod logs.

  The MinIO and GlitchTip credentials should be discoverable from the cluster
  secrets and ConfigMaps.

