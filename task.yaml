id: null
prompt: |
  The platform team reran a quarterly restore drill for GlitchTip, and the
  result was uncomfortable: the backup path has been reporting healthy for a
  while, but the restored data did not line up with what people expected to
  see in the app.

  This is not a brand-new backup pipeline. Someone has already worked on it,
  and at a quick glance it can look fine. The problem is that a "green" run is
  currently not a reliable signal that the system could actually be recovered
  cleanly.

  Investigate the existing backup flow in the `glitchtip` namespace and make it
  trustworthy again. A healthy run should still complete. A bad run should stop
  itself instead of quietly producing a misleading result. There is already a
  run-status note somewhere in the cluster, but it is stale enough that on-call
  cannot trust it right now. Make the latest run state obvious there without
  requiring someone to read pod logs.

  Keep the fix surgical. Do not solve this by broadly loosening storage access
  or removing surrounding controls just to force a green backup.

